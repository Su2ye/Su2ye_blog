{% extends "base.html" %}
{% load blog_tags %}

{% block title %}关于{% endblock %}

{% block content %}
<article class="page-content">
    <h1>关于我</h1>
    <p>Hi，我是 Su2ye。</p>
    <p>这个博客记录我的学习笔记、开发经验和对技术的思考。希望这些内容对你有所帮助。</p>
    <p>如有任何问题或建议，欢迎在文章评论区与我交流。</p>
    <p style="margin-top:32px;padding-top:24px;border-top:1px solid var(--border);color:var(--text-muted);font-size:14px;">
        已写 <strong style="color:var(--accent);">{% get_post_count %}</strong> 篇文章
        · <strong style="color:var(--accent);">{% get_categories as cats %}{{ cats|length }}</strong> 个分类
    </p>
</article>
{% endblock %}
