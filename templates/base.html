<!DOCTYPE html>
{% load static blog_tags %}
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}首页{% endblock %} | Su2ye 的博客</title>
    <link rel="alternate" type="application/rss+xml" title="Su2ye 的博客 RSS" href="{% url 'blog:rss' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header class="site-header" id="site-header">
        <div class="header-inner">
            <a href="{% url 'blog:home' %}" class="site-logo">Su2ye</a>
            <nav class="site-nav">
                <a href="{% url 'blog:home' %}">文章</a>
                <a href="{% url 'blog:about' %}">关于</a>
                <a href="{% url 'blog:rss' %}">RSS</a>
            </nav>
            <form class="header-search" action="{% url 'blog:search' %}" method="get">
                <input type="text" name="q" placeholder="搜索..." value="{{ search_query|default:'' }}">
            </form>
        </div>
    </header>

    {% block hero %}{% endblock %}

    <main class="main-layout">
        <section class="content">
            {% block content %}{% endblock %}
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; {% now "Y" %} Su2ye.site</p>
    </footer>
</body>
</html>
